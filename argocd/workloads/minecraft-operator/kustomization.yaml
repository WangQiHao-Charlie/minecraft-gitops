apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../../../minecraft-operator/config/default
images:
- name: controller
  newName: ghcr.io/wangqihao-charlie/minecraft-operator
  newTag: latest
patches:
- path: rbac-extra-rules.yaml
  target:
    group: rbac.authorization.k8s.io
    version: v1
    kind: ClusterRole
    name: manager-role
