apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: minecraft-backend
  namespace: minecraft
  annotations:
    argocd.argoproj.io/sync-wave: "0"
rules:
- apiGroups:
  - minecraft.charlie-cloud.me
  resources:
  - servers
  verbs:
  - create
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - pods/log
  verbs:
  - get
- apiGroups:
  - ""
  resources:
  - services
  - endpoints
  verbs:
  - get
  - list
  - watch
