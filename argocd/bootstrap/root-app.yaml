apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minecraft-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/WangQiHao-Charlie/minecraft-backend.git
    targetRevision: main
    path: minecraft/gitops/argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
