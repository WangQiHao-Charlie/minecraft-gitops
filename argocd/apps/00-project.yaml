apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: minecraft
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  description: GitOps project for minecraft backend and operator
  sourceRepos:
  - https://github.com/WangQiHao-Charlie/minecraft-backend.git
  - git@github.com:WangQiHao-Charlie/minecraft-backend.git
  destinations:
  - namespace: argocd
    server: https://kubernetes.default.svc
  - namespace: mc-infra
    server: https://kubernetes.default.svc
  - namespace: minecraft
    server: https://kubernetes.default.svc
  - namespace: minecraft-operator-system
    server: https://kubernetes.default.svc
  - namespace: istio-system
    server: https://kubernetes.default.svc
  clusterResourceWhitelist:
  - group: ""
    kind: Namespace
  - group: apiextensions.k8s.io
    kind: CustomResourceDefinition
  - group: rbac.authorization.k8s.io
    kind: ClusterRole
  - group: rbac.authorization.k8s.io
    kind: ClusterRoleBinding
  namespaceResourceWhitelist:
  - group: "*"
    kind: "*"
